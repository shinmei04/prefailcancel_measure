<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">SEOからGEOへの変化</title>
  <desc id="desc">従来検索では検索結果の上位表示が重要だったが、生成検索では回答内で引用・要約されることが重要になることを示す概念図。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0D1828" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2688B6"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#FFFFFF"/>
  <g filter="url(#shadow)">
    <rect x="70" y="105" width="455" height="360" rx="26" fill="#F7F9FA" stroke="#DFE3E5" stroke-width="2"/>
    <rect x="675" y="105" width="455" height="360" rx="26" fill="#F7F9FA" stroke="#DFE3E5" stroke-width="2"/>
  </g>

  <text x="297" y="152" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="26" font-weight="800" fill="#2688B6">従来検索</text>
  <text x="297" y="184" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="18" fill="#465359">検索結果ページで上位表示を狙う</text>

  <rect x="125" y="220" width="345" height="42" rx="18" fill="#FFFFFF" stroke="#2688B6" stroke-width="2.4"/>
  <circle cx="153" cy="241" r="9" fill="none" stroke="#2688B6" stroke-width="3"/>
  <line x1="160" y1="248" x2="171" y2="259" stroke="#2688B6" stroke-width="3" stroke-linecap="round"/>
  <text x="195" y="248" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="18" fill="#0D1828">クエリ</text>

  <g font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif">
    <rect x="125" y="294" width="345" height="42" rx="10" fill="#E8F6FB" stroke="#2688B6" stroke-width="1.5"/>
    <text x="145" y="321" font-size="17" font-weight="700" fill="#0D1828">1. WebページA</text>
    <rect x="125" y="347" width="345" height="42" rx="10" fill="#FFFFFF" stroke="#DFE3E5" stroke-width="1.5"/>
    <text x="145" y="374" font-size="17" fill="#465359">2. WebページB</text>
    <rect x="125" y="400" width="345" height="42" rx="10" fill="#FFFFFF" stroke="#DFE3E5" stroke-width="1.5"/>
    <text x="145" y="427" font-size="17" fill="#465359">3. WebページC</text>
  </g>

  <text x="902" y="152" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="26" font-weight="800" fill="#2688B6">生成検索</text>
  <text x="902" y="184" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="18" fill="#465359">回答内で引用・要約されるかが重要</text>

  <rect x="730" y="220" width="345" height="42" rx="18" fill="#FFFFFF" stroke="#2688B6" stroke-width="2.4"/>
  <circle cx="758" cy="241" r="9" fill="none" stroke="#2688B6" stroke-width="3"/>
  <line x1="765" y1="248" x2="776" y2="259" stroke="#2688B6" stroke-width="3" stroke-linecap="round"/>
  <text x="800" y="248" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="18" fill="#0D1828">クエリ</text>

  <rect x="730" y="294" width="345" height="148" rx="18" fill="#FFFFFF" stroke="#969FA7" stroke-width="1.6"/>
  <text x="755" y="328" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="18" font-weight="700" fill="#0D1828">生成された回答</text>
  <rect x="755" y="350" width="205" height="14" rx="7" fill="#2688B6" opacity="0.25"/>
  <rect x="755" y="376" width="270" height="14" rx="7" fill="#2688B6" opacity="0.18"/>
  <rect x="755" y="402" width="235" height="14" rx="7" fill="#2688B6" opacity="0.18"/>
  <rect x="970" y="346" width="70" height="28" rx="14" fill="#27CED7"/>
  <text x="1005" y="366" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif" font-size="15" font-weight="700" fill="#fff">引用</text>

  <line x1="545" y1="280" x2="653" y2="280" stroke="#2688B6" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
