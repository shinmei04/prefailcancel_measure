<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="310" viewBox="0 0 1100 310" role="img" aria-labelledby="title desc">
  <title id="title">GEOの説明カード</title>
  <desc id="desc">文書側を変えることと、回答内で見えるようにすることを説明する2つのカード。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0D1828" flood-opacity="0.10"/>
    </filter>
    <style>
      .title-text {
        font-family: Hiragino Sans, Yu Gothic, Meiryo UI, sans-serif;
        fill: #0D1828;
        font-size: 34px;
        font-weight: 800;
      }
      .body-text {
        font-family: Hiragino Sans, Yu Gothic, Meiryo UI, sans-serif;
        fill: #263238;
        font-size: 25px;
        font-weight: 500;
      }
    </style>
  </defs>

  <rect width="1100" height="310" fill="#FFFFFF"/>

  <g filter="url(#shadow)">
    <rect x="32" y="42" width="498" height="218" rx="20" fill="#F7F9FA"/>
    <rect x="570" y="42" width="498" height="218" rx="20" fill="#F7F9FA"/>
  </g>

  <rect x="32" y="42" width="8" height="218" rx="4" fill="#2688B6"/>
  <rect x="570" y="42" width="8" height="218" rx="4" fill="#27CED7"/>

  <text x="72" y="112" class="title-text">文書側を変える</text>
  <text x="72" y="170" class="body-text">出典、統計、引用句、文体、</text>
  <text x="72" y="208" class="body-text">構造などを調整する。</text>

  <text x="610" y="112" class="title-text">回答内で見えるようにする</text>
  <text x="610" y="170" class="body-text">対象文書が引用・要約・参照</text>
  <text x="610" y="208" class="body-text">されやすくなることを狙う。</text>
</svg>
