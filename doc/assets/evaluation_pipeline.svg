<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">実験評価のパイプライン</title>
  <desc id="desc">日本語クエリと文書から条件別の文書を作り、生成エンジンに入力し、回答内での可視性を評価する流れ。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#0D1828" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2688B6"/>
    </marker>
    <style>
      .label { font-family: Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif; fill: #0D1828; }
      .box { fill: #fff; stroke: #DFE3E5; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1200" height="560" rx="34" fill="#F7F9FA"/>
  <text x="600" y="55" class="label" text-anchor="middle" font-size="34" font-weight="900">実験設計: 条件ごとの可視性を比較する</text>

  <g filter="url(#shadow)">
    <rect class="box" x="50" y="140" width="190" height="140" rx="24"/>
    <rect class="box" x="300" y="110" width="220" height="200" rx="24"/>
    <rect class="box" x="580" y="140" width="190" height="140" rx="24"/>
    <rect class="box" x="830" y="140" width="190" height="140" rx="24"/>
    <rect class="box" x="530" y="365" width="330" height="110" rx="24"/>
  </g>

  <text x="145" y="178" class="label" text-anchor="middle" font-size="22" font-weight="800">データセット</text>
  <text x="145" y="214" class="label" text-anchor="middle" font-size="17">日本語クエリ</text>
  <text x="145" y="242" class="label" text-anchor="middle" font-size="17">対応文書集合</text>

  <text x="410" y="148" class="label" text-anchor="middle" font-size="22" font-weight="800">文書変換条件</text>
  <g class="label" font-size="17" font-weight="700">
    <rect x="335" y="178" width="150" height="32" rx="16" fill="#F4F7F8"/>
    <text x="410" y="200" text-anchor="middle">無変換</text>
    <rect x="335" y="222" width="150" height="32" rx="16" fill="#E8F6FB"/>
    <text x="410" y="244" text-anchor="middle">固定GEO</text>
    <rect x="335" y="266" width="150" height="32" rx="16" fill="#E9FBFC"/>
    <text x="410" y="288" text-anchor="middle">意図適応GEO</text>
  </g>

  <text x="675" y="178" class="label" text-anchor="middle" font-size="22" font-weight="800">生成エンジン</text>
  <text x="675" y="214" class="label" text-anchor="middle" font-size="17">検索結果文脈を入力</text>
  <text x="675" y="242" class="label" text-anchor="middle" font-size="17">回答を生成</text>

  <text x="925" y="178" class="label" text-anchor="middle" font-size="22" font-weight="800">回答解析</text>
  <text x="925" y="214" class="label" text-anchor="middle" font-size="17">引用されたか</text>
  <text x="925" y="242" class="label" text-anchor="middle" font-size="17">どこに現れたか</text>

  <text x="695" y="405" class="label" text-anchor="middle" font-size="22" font-weight="800">評価指標</text>
  <text x="695" y="440" class="label" text-anchor="middle" font-size="17">引用率・位置・利用量・関連性・影響度</text>

  <line x1="250" y1="210" x2="288" y2="210" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="530" y1="210" x2="568" y2="210" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="780" y1="210" x2="818" y2="210" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M925 292 C925 340, 800 345, 780 362" fill="none" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
