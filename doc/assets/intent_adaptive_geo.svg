<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">意図適応型GEOのキーアイディア</title>
  <desc id="desc">日本語クエリを検索意図に分類し、意図ごとにGEO操作を切り替えて文書を最適化し、生成エンジンの回答内で引用・要約されやすくする流れ。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0D1828" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#2688B6"/>
    </marker>
    <style>
      .label { font-family: Hiragino Sans, Yu Gothic, Noto Sans JP, sans-serif; fill: #0D1828; }
      .small { font-size: 18px; }
      .mid { font-size: 22px; font-weight: 800; }
      .box { fill: #ffffff; stroke: #DFE3E5; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1200" height="600" rx="36" fill="#F7F9FA"/>
  <text x="600" y="54" class="label" text-anchor="middle" font-size="34" font-weight="900">キーアイディア: 検索意図に合わせてGEO操作を切り替える</text>

  <g filter="url(#shadow)">
    <rect class="box" x="54" y="128" width="190" height="115" rx="22"/>
    <rect class="box" x="312" y="100" width="250" height="345" rx="24"/>
    <rect class="box" x="628" y="100" width="250" height="345" rx="24"/>
    <rect class="box" x="946" y="128" width="200" height="115" rx="22"/>
    <rect class="box" x="946" y="332" width="200" height="115" rx="22"/>
  </g>

  <text x="149" y="165" class="label mid" text-anchor="middle">日本語クエリ</text>
  <text x="149" y="199" class="label small" text-anchor="middle">例: どちらが良い?</text>

  <text x="437" y="143" class="label mid" text-anchor="middle">意図分類</text>
  <g class="label" font-size="18" font-weight="700">
    <rect x="350" y="176" width="174" height="42" rx="18" fill="#E8F6FB"/>
    <text x="437" y="203" text-anchor="middle">事実確認型</text>
    <rect x="350" y="235" width="174" height="42" rx="18" fill="#E9FBFC"/>
    <text x="437" y="262" text-anchor="middle">比較型</text>
    <rect x="350" y="294" width="174" height="42" rx="18" fill="#F4F7F8"/>
    <text x="437" y="321" text-anchor="middle">解説型</text>
    <rect x="350" y="353" width="174" height="42" rx="18" fill="#FDEBF2"/>
    <text x="437" y="380" text-anchor="middle">論点整理型</text>
  </g>

  <text x="753" y="143" class="label mid" text-anchor="middle">操作選択</text>
  <g class="label" font-size="17">
    <text x="753" y="194" text-anchor="middle">出典追加・統計追加</text>
    <line x1="680" y1="208" x2="826" y2="208" stroke="#27CED7" stroke-width="5" stroke-linecap="round"/>
    <text x="753" y="254" text-anchor="middle">比較軸の明示・構造化</text>
    <line x1="668" y1="268" x2="838" y2="268" stroke="#27CED7" stroke-width="5" stroke-linecap="round"/>
    <text x="753" y="314" text-anchor="middle">流暢化・やさしい表現化</text>
    <line x1="665" y1="328" x2="841" y2="328" stroke="#27CED7" stroke-width="5" stroke-linecap="round"/>
    <text x="753" y="374" text-anchor="middle">引用句追加・権威化</text>
    <line x1="682" y1="388" x2="824" y2="388" stroke="#27CED7" stroke-width="5" stroke-linecap="round"/>
  </g>

  <text x="1046" y="165" class="label mid" text-anchor="middle">最適化文書</text>
  <text x="1046" y="199" class="label small" text-anchor="middle">意味を保ちつつ変換</text>

  <text x="1046" y="369" class="label mid" text-anchor="middle">生成回答</text>
  <text x="1046" y="403" class="label small" text-anchor="middle">引用・要約されやすい</text>

  <line x1="250" y1="186" x2="300" y2="186" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="570" y1="272" x2="616" y2="272" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="886" y1="186" x2="934" y2="186" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1046" y1="252" x2="1046" y2="318" stroke="#2688B6" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="600" y="525" class="label" text-anchor="middle" font-size="24" font-weight="800" fill="#2688B6">固定的な最適化ではなく「質問の種類」に応じて文書表現を変える</text>
</svg>
